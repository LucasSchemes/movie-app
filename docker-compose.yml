services:
  db:
    image: mysql:8.0
    container_name: movie_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: movie_app
    ports:
      - "3306:3306"
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: movie_backend
    volumes:
      - ./backend:/app
    environment:
      - FLASK_DEBUG=1
      - TMDB_API_KEY=caf86df19dc51e071fac76f585875a6b
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/movie_app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: movie_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"

volumes:
  mysql_data:
